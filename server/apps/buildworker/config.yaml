Name: buildworker

Log:
  ServiceName: buildworker
  KeepDays: 7
  Mode: console
  Level: info

Mysql:
  Addr: 127.0.0.1:3306
  UserName: root
  Password: ""
  DB: control
  CharSet: utf8mb4
  Maxopen: 5
  Maxidle: 3
  MaxIdleTime: 30s
  MaxLifeTime: 60s

Redis:
  Addr: 127.0.0.1:6379
  Password: ""
  DB: 10
  PoolSize: 3

Worker:
  MaxConcurrent: 2
  PollInterval: 5
  ScriptsDir: "/opt/build/scripts"
  OutputDir: "/opt/build/outputs"
  MerchantsDir: "/opt/build/merchants"
  BuildTimeout: 1800

Storage:
  Type: "aliyun"
  CloudAccountID: 0
  RegionID: "cn-shenzhen"
  Bucket: "your-bucket-name"
  ObjectPrefix: "builds/"
